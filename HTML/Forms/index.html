<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forms</title>
    </head>

    <body>
        <form action="index.php" method="POST" enctype="multipart/form-data">

            <label for="username">USERNAME:</label>
            <input type="text" id="username" placeholder="Spongebob" minlength="6" maxlength="15" required><br>
            
            <label for="password">PASSWORD:</label>
            <input type="password" id="password" minlength="6" maxlength="15" required><br>
            
            <label for="email">EMAIL:</label>
            <input type="email" id="email" placeholder="wdaisdjdo@gmail.com"><br>

            <label for="phone">PHONE NUMBER:</label>
            <input type="tel" id="phone" placeholder="023-2325-2142" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br>

            <label for="bday">BIRTHDATE:</label>
            <input type="date" id="bday"><br>

            <label for="quantity">QUANTITY:</label>
            <input type="number" id="quantity" min="0" max="99"><br>

            <label for="title">TITLE:</label><br>

            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title"><br>
            <label for="Ms.">Ms.</label>
            <input type="radio" id="Ms." value="Ms." name="title"><br>
            <label for="PhD.">PhD.</label>
            <input type="radio" id="PhD." value="PhD." name="title"><br>

            <label for="payment">PAYMENT:</label>
            <select id="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="giftcard">Giftcard</option>
            </select><br>

            <label for="subscribe">SUBSCRIBE:</label>
            <input type="checkbox" id="subscribe"><br>

            <label for="comment">COMMENT:</label>
            <textarea id="comment" row="3" cols="25"></textarea><br>

            <label for="file">FILE:</label>
            <input type="file" id="file" accept="image/png, image/jpeg"><br>

            <input type="reset"><br>
            <input type="submit">

        </form>
    </body>
</html>
